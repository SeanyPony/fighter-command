<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starship Command: Status Synergy</title>
    <style>
        body { margin: 0; background: #010105; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        canvas { border: 2px solid #1a1a2e; background: #000; box-shadow: 0 0 60px rgba(0, 150, 255, 0.2); }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = 800;
        const HEIGHT = 600;

        // --- ASSETS ---
        const shipImage = new Image();
        shipImage.crossOrigin = "anonymous"; 
        shipImage.src = "https://i.postimg.cc/MK387Tmr/player-ship.png";

        // --- ENGINE STATE ---
        let gameState = "START"; 
        let sector = 0; 
        let keys = {};
        let starfield = [];
        let particles = [];      
        let thrustParticles = []; 
        let playerBullets = [];
        let enemyBullets = [];
        let enemies = [];
        let items = []; 
        let blasts = [];
        let selectedUpgrades = [];
        let scoreSubmitted = false;

        const UPGRADE_POOL = [
            { id: 1, name: "Attack Speed", desc: "Fire rate +25% (Also boosts Laser DMG)", icon: "⚡" },
            { id: 2, name: "Vulcan Spread", desc: "+1 Projectile/Beam per shot", icon: "🏹" },
            { id: 3, name: "Plasma Laser", desc: "Piercing electrical arcs", icon: "⌁" },
            { id: 4, name: "Nanite Repair", desc: "Passive healing over time", icon: "✚" },
            { id: 5, name: "Micro-Frame", desc: "Smaller hitbox & +15% Speed", icon: "▫" },
            { id: 7, name: "Flak Munitions", desc: "Explosive hits; Ranks boost Blast DMG", icon: "💥" },
            { id: 8, name: "Aegis Shield", desc: "Block hit every 15s", icon: "🛡" },
            { id: 9, name: "Energy Blade", desc: "Fixed 75px Radius; High Stacking DMG", icon: "◍" },
            { id: 12, name: "Overclock Thrusters", desc: "Movement speed +20%", icon: "⏩" },
            { id: 13, name: "Chain Shot", desc: "Bounces & longer laser chains", icon: "☇" },
            { id: 14, name: "Titan Core", desc: "Global Damage +30%", icon: "🎯" },
            { id: 15, name: "Hardened Shell", desc: "+50 Max HP & Repair", icon: "⬢" },
            { id: 16, name: "Plasma Burn", desc: "DOT: Burning enemies take damage over time", icon: "🔥" },
            { id: 17, name: "Carbon Freeze", desc: "DEBUFF: Hits slow enemy fire rates", icon: "❄" }
        ];

        // --- HISTORY ---
        function getRunHistory() { return JSON.parse(localStorage.getItem('starshipRunHistory') || '[]'); }
        function saveRun(name, s) {
            let history = getRunHistory();
            history.push({ name: name.toUpperCase(), sector: s, date: new Date().toLocaleDateString() });
            history.sort((a, b) => b.sector - a.sector);
            localStorage.setItem('starshipRunHistory', JSON.stringify(history));
        }

        class Player {
            constructor() { this.reset(); }
            reset() {
                this.x = WIDTH / 2; this.y = HEIGHT - 100;
                this.speed = 5.8; this.fireRate = 500;
                this.lastShot = 0; this.bulletCount = 1;
                this.damage = 25; this.hp = 100; this.maxHp = 100;
                this.upgrades = {}; this.shieldReady = false; this.lastShield = 0;
            }
            get radius() { 
                let mod = this.upgrades["Micro-Frame"] ? Math.pow(0.8, this.upgrades["Micro-Frame"]) : 1;
                return 18 * mod; 
            }
            update() {
                let moving = false;
                if (keys['w'] || keys['arrowup']) { this.y -= this.speed; moving = true; }
                if (keys['s'] || keys['arrowdown']) { this.y += this.speed; moving = true; }
                if (keys['a'] || keys['arrowleft']) { this.x -= this.speed; moving = true; }
                if (keys['d'] || keys['arrowright']) { this.x += this.speed; moving = true; }
                this.x = Math.max(25, Math.min(WIDTH - 25, this.x));
                this.y = Math.max(25, Math.min(HEIGHT - 25, this.y));
                this.spawnThrusters(moving);

                if (this.upgrades["Nanite Repair"] && Date.now() % 3000 < 20) {
                    this.hp = Math.min(this.maxHp, this.hp + (this.upgrades["Nanite Repair"] * 2));
                }
                if (this.upgrades["Aegis Shield"] && !this.shieldReady) {
                    if (Date.now() - this.lastShield > 15000) this.shieldReady = true;
                }
                if (this.upgrades["Energy Blade"]) {
                    const r = 75;
                    const rank = this.upgrades["Energy Blade"];
                    const tickDmg = (this.damage * 0.35 * Math.pow(1.35, rank - 1)) / 60;
                    enemies.forEach(e => {
                        if (Math.hypot(this.x - e.x, this.y - e.y) < r) e.takeDamage(tickDmg);
                    });
                }
                this.handleCombat();
            }

            spawnThrusters(moving) {
                const count = moving ? 4 : 1;
                for(let i=0; i<count; i++) {
                    thrustParticles.push({
                        x: this.x + (Math.random() - 0.5) * 8, y: this.y + this.radius * 0.8,
                        vx: (Math.random() - 0.5) * (moving ? 3 : 1), vy: 4 + Math.random() * 5,
                        life: 1.0, color: ["#FFFFFF", "#FFFF00", "#FF6600"][Math.floor(Math.random() * 3)]
                    });
                }
            }

            handleCombat() {
                if (enemies.length === 0) return;
                const now = Date.now();
                const laserActive = (this.upgrades["Plasma Laser"] || 0) > 0;
                const chainRank = this.upgrades["Chain Shot"] || 0;

                if (laserActive) {
                    const speedMultiplier = 500 / this.fireRate;
                    const beamDmg = (this.damage * 1.1 * speedMultiplier) / 60;
                    const baseTargets = this.getNearestEnemies(this.bulletCount);
                    
                    baseTargets.forEach(firstTarget => {
                        let chain = [this, firstTarget];
                        let available = enemies.filter(e => e !== firstTarget);
                        for (let j = 0; j < chainRank; j++) {
                            let last = chain[chain.length - 1];
                            let next = enemies.find(e => available.includes(e) && Math.hypot(e.x - last.x, e.y - last.y) < 450);
                            if (next) { chain.push(next); available = available.filter(e => e !== next); } else break;
                        }
                        const ln = chain[chain.length-1]; const pn = chain[chain.length-2];
                        const a = Math.atan2(ln.y - (pn ? pn.y : this.y), ln.x - (pn ? pn.x : this.x));
                        const extension = { x: ln.x + Math.cos(a)*1200, y: ln.y + Math.sin(a)*1200 };
                        chain.push(extension);

                        for (let k = 0; k < chain.length - 1; k++) {
                            const p1 = chain[k]; const p2 = chain[k+1];
                            enemies.forEach(e => {
                                if (checkCircleSegmentIntersect(p1.x, p1.y, p2.x, p2.y, e.x, e.y, 28)) {
                                    e.takeDamage(beamDmg);
                                    if (this.upgrades["Plasma Burn"]) e.applyBurn(this.upgrades["Plasma Burn"]);
                                    if (this.upgrades["Carbon Freeze"]) e.applyFreeze(this.upgrades["Carbon Freeze"]);
                                    if (Math.random() > 0.94) spawnParticles(e.x, e.y, "#00ffff", 1);
                                }
                            });
                        }
                    });
                } else if (now - this.lastShot > this.fireRate) {
                    let targets = this.getNearestEnemies(1);
                    if (targets.length > 0) {
                        const target = targets[0];
                        const angle = Math.atan2(target.y - this.y, target.x - this.x);
                        for (let i = 0; i < this.bulletCount; i++) {
                            const offset = (i - (this.bulletCount - 1) / 2) * 0.15;
                            playerBullets.push(new Bullet(this.x, this.y, this.damage, angle + offset, true));
                        }
                        this.lastShot = now;
                    }
                }
            }

            getNearestEnemies(count) {
                return [...enemies].sort((a, b) => Math.hypot(a.x - this.x, a.y - this.y) - Math.hypot(b.x - this.x, b.y - this.y)).slice(0, count);
            }

            draw() {
                ctx.save();
                if (this.upgrades["Energy Blade"]) {
                    ctx.beginPath(); ctx.arc(this.x, this.y, 75, 0, Math.PI * 2);
                    ctx.strokeStyle = "rgba(0, 210, 255, 0.25)"; ctx.lineWidth = 3; ctx.stroke();
                }
                if (this.upgrades["Plasma Laser"] && enemies.length > 0) {
                    const chainRank = this.upgrades["Chain Shot"] || 0;
                    const baseTargets = this.getNearestEnemies(this.bulletCount);
                    ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff";
                    ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4; ctx.lineJoin = "round";
                    baseTargets.forEach(firstTarget => {
                        ctx.beginPath(); ctx.moveTo(this.x, this.y);
                        let chainNodes = [this, firstTarget];
                        let available = enemies.filter(e => e !== firstTarget);
                        for (let j = 0; j < chainRank; j++) {
                            let last = chainNodes[chainNodes.length - 1];
                            let next = enemies.find(e => available.includes(e) && Math.hypot(e.x - last.x, e.y - last.y) < 450);
                            if (next) { chainNodes.push(next); available = available.filter(e => e !== next); } else break;
                        }
                        const ln = chainNodes[chainNodes.length-1]; const pn = chainNodes[chainNodes.length-2];
                        const a = Math.atan2(ln.y - pn.y, ln.x - pn.x);
                        chainNodes.slice(1).forEach(node => ctx.lineTo(node.x, node.y));
                        ctx.lineTo(ln.x + Math.cos(a)*1000, ln.y + Math.sin(a)*1000);
                        ctx.stroke();
                    });
                }
                ctx.translate(this.x, this.y);
                if (this.shieldReady) {
                    ctx.beginPath(); ctx.arc(0, 0, this.radius + 15, 0, Math.PI * 2);
                    ctx.strokeStyle = "rgba(0, 255, 255, 0.8)"; ctx.lineWidth = 2; ctx.stroke();
                }
                if (shipImage.complete && shipImage.naturalWidth !== 0) {
                    ctx.save(); ctx.rotate(-Math.PI / 2);
                    ctx.drawImage(shipImage, -this.radius, -this.radius, this.radius * 2, this.radius * 2);
                    ctx.restore();
                } else {
                    ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(-12, 12); ctx.lineTo(12, 12); ctx.closePath(); ctx.stroke();
                }
                ctx.restore();
            }
        }

        class Enemy {
            constructor(w) {
                const archetypes = ["Scout", "Twin", "Interceptor", "Dreadnought", "Nova"];
                this.type = (w <= 1) ? "Scout" : archetypes[Math.floor(Math.random() * Math.min(archetypes.length, Math.floor(w/2)+1))];
                this.x = Math.random() * (WIDTH - 100) + 50; this.y = -60;
                this.targetY = 40 + Math.random() * 220;
                this.hp = (w <= 1) ? 35 : 40 + (w * 22);
                this.maxHp = this.hp; this.fireRate = 3800 - (w * 75);
                this.lastShot = Date.now() + Math.random() * 2000;
                this.color = this.getColor();
                // Status effects
                this.burnTicks = 0; this.burnDps = 0;
                this.freezeTicks = 0; this.freezePower = 0;
            }
            getColor() { return {Scout: "#00ff88", Twin: "#ffff00", Interceptor: "#ffaa00", Dreadnought: "#ff3333", Nova: "#bf00ff"}[this.type]; }
            
            applyBurn(rank) {
                this.burnTicks = 180; // 3 seconds
                this.burnDps = (10 + (rank * 15)) / 60;
            }
            applyFreeze(rank) {
                this.freezeTicks = 180; // 3 seconds
                this.freezePower = 1 + (rank * 0.5);
            }
            takeDamage(amt) { this.hp -= amt; }

            update() {
                if (this.y < this.targetY) this.y += 2.5;
                else {
                    this.x += Math.sin(Date.now() / 1500) * 1.5;
                    this.x = Math.max(25, Math.min(WIDTH - 25, this.x));
                }

                // Process Status Effects
                if (this.burnTicks > 0) {
                    this.hp -= this.burnDps; this.burnTicks--;
                    if (Math.random() > 0.8) spawnParticles(this.x, this.y, "#ff6600", 1);
                }
                if (this.freezeTicks > 0) { this.freezeTicks--; }

                const currentFireRate = this.freezeTicks > 0 ? this.fireRate * (1 + this.freezePower) : this.fireRate;
                if (Date.now() - this.lastShot > currentFireRate) { this.fire(); this.lastShot = Date.now(); }
            }
            fire() {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                const spd = 3.0;
                switch(this.type) {
                    case "Scout": enemyBullets.push(new Bullet(this.x, this.y, 10, angle, false, this.color, spd)); break;
                    case "Twin":
                        enemyBullets.push(new Bullet(this.x-8, this.y, 10, angle, false, this.color, spd+0.2));
                        enemyBullets.push(new Bullet(this.x+8, this.y, 10, angle, false, this.color, spd+0.2)); break;
                    case "Interceptor":
                        for(let i=0; i<3; i++) setTimeout(() => {
                            if(gameState==="PLAYING") enemyBullets.push(new Bullet(this.x, this.y, 5, angle, false, this.color, spd*2));
                        }, i*120); break;
                    case "Dreadnought": enemyBullets.push(new Bullet(this.x, this.y, 35, angle, false, this.color, spd*0.8, 2.0)); break;
                    case "Nova":
                        for(let i=0; i<10; i++) enemyBullets.push(new Bullet(this.x, this.y, 10, (i/10)*Math.PI*2, false, this.color, spd+0.2));
                        break;
                }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                const displayColor = this.freezeTicks > 0 ? "#00ffff" : this.color;
                ctx.shadowBlur = 10; ctx.shadowColor = displayColor;
                ctx.strokeStyle = displayColor; ctx.lineWidth = 2;
                ctx.beginPath();
                if(this.type === "Scout") { ctx.moveTo(0, 15); ctx.lineTo(-12, -10); ctx.lineTo(12, -10); }
                else if(this.type === "Twin") { ctx.strokeRect(-12,-10,8,20); ctx.strokeRect(4,-10,8,20); }
                else if(this.type === "Interceptor") { ctx.moveTo(0,18); ctx.lineTo(-10,-12); ctx.lineTo(10,-12); }
                else if(this.type === "Dreadnought") { ctx.strokeRect(-18,-15,36,30); ctx.moveTo(-18,0); ctx.lineTo(18,0); }
                else { ctx.arc(0,0,13,0,Math.PI*2); }
                ctx.closePath(); ctx.stroke();
                if (this.burnTicks > 0) { ctx.fillStyle = "#ff6600"; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill(); }
                ctx.fillStyle = "#111"; ctx.fillRect(-15, -28, 30, 4);
                ctx.fillStyle = displayColor; ctx.fillRect(-15, -28, (this.hp/this.maxHp)*30, 4);
                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, dmg, angle, isPlayer, color="#00f2ff", speed=15, size=1) {
                this.x = x; this.y = y; this.dmg = dmg; this.angle = angle;
                this.isPlayer = isPlayer; this.color = color;
                this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.size = size; this.life = 180; this.bounces = 0; this.visited = [];
            }
            update() { this.x += this.vx; this.y += this.vy; this.life--; }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.fillStyle = this.color;
                ctx.fillRect(-10*this.size, -2*this.size, 20*this.size, 4*this.size); ctx.restore();
            }
        }

        class Item {
            constructor(x, y, type) { this.x = x; this.y = y; this.type = type; this.spawnTime = Date.now(); }
            update() {
                const age = Date.now() - this.spawnTime;
                if (age > 20000) return true;
                if (Math.hypot(this.x - player.x, this.y - player.y) < 35) {
                    if (this.type === "repair") { player.hp = Math.min(player.maxHp, player.hp + player.maxHp * 0.3); spawnParticles(this.x, this.y, "#00ff88", 20); }
                    else triggerUpgrade();
                    return true;
                }
                return false;
            }
            draw() {
                const age = Date.now() - this.spawnTime;
                if (age > 15000 && Math.floor(Date.now() / 150) % 2 === 0) return;
                ctx.save(); ctx.translate(this.x, this.y);
                ctx.shadowBlur = 15; ctx.shadowColor = this.type === "repair" ? "#00ff88" : "#ffd700";
                ctx.strokeStyle = ctx.shadowColor; ctx.lineWidth = 3;
                if (this.type === "repair") { ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(10,0); ctx.moveTo(0,-10); ctx.lineTo(0,10); ctx.stroke(); }
                else ctx.strokeRect(-8, -8, 16, 16);
                ctx.restore();
            }
        }

        class Blast {
            constructor(x, y, radius, dmg) {
                this.x = x; this.y = y; this.maxRadius = radius; this.radius = 0; this.dmg = dmg; this.alpha = 1;
            }
            update() { this.radius += 6; this.alpha -= 0.04; return this.alpha <= 0; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = "#ffaa00"; ctx.lineWidth = 4; ctx.stroke(); ctx.restore();
            }
        }

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, 
                    a: 1, c: color, update() { this.x+=this.vx; this.y+=this.vy; this.a-=0.035; }
                });
            }
        }

        function checkCircleSegmentIntersect(x1, y1, x2, y2, cx, cy, r) {
            const dx = x2 - x1; const dy = y2 - y1; const lenSq = dx * dx + dy * dy;
            if (lenSq === 0) return Math.hypot(cx-x1, cy-y1) <= r;
            const t = Math.max(0, Math.min(1, ((cx - x1) * dx + (cy - y1) * dy) / lenSq));
            return Math.hypot(cx - (x1 + t * dx), cy - (y1 + t * dy)) <= r;
        }

        function triggerUpgrade() { gameState = "UPGRADE"; selectedUpgrades = [...UPGRADE_POOL].sort(() => 0.5 - Math.random()).slice(0, 3); }

        function applyUpgrade(up) {
            player.upgrades[up.name] = (player.upgrades[up.name] || 0) + 1;
            switch(up.id) {
                case 1: player.fireRate *= 0.75; break;
                case 2: player.bulletCount++; break;
                case 14: player.damage *= 1.35; break;
                case 15: player.maxHp += 50; player.hp = player.maxHp; break;
            }
            if (gameState === "START") { sector = 1; gameState = "PLAYING"; spawnSector(); }
            else { gameState = "PLAYING"; if (enemies.length === 0) { sector++; spawnSector(); } }
        }

        function spawnSector() {
            const count = (sector <= 1) ? 2 : 1 + Math.floor(sector * 0.9);
            for (let i = 0; i < count; i++) enemies.push(new Enemy(sector));
        }

        function resetGame() { player.reset(); enemies = []; playerBullets = []; enemyBullets = []; items = []; particles = []; blasts = []; thrustParticles = []; sector = 1; gameState = "START"; triggerUpgrade(); scoreSubmitted = false; }

        function update() {
            starfield.forEach(s => { s.y += s.speed; if(s.y > HEIGHT) s.y = 0; });
            if (gameState !== "PLAYING") return;
            player.update();
            particles.forEach((p, i) => { p.update(); if (p.a <= 0) particles.splice(i, 1); });
            items.forEach((it, i) => { if (it.update()) items.splice(i, 1); });
            blasts.forEach((bl, i) => { if (bl.update()) blasts.splice(i, 1); });
            thrustParticles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.05; if (p.life <= 0) thrustParticles.splice(i, 1); });

            playerBullets.forEach((b, bi) => {
                b.update();
                enemies.forEach(e => {
                    if (Math.hypot(b.x - e.x, b.y - e.y) < 28 && !b.visited.includes(e)) {
                        e.takeDamage(player.damage); 
                        if (player.upgrades["Plasma Burn"]) e.applyBurn(player.upgrades["Plasma Burn"]);
                        if (player.upgrades["Carbon Freeze"]) e.applyFreeze(player.upgrades["Carbon Freeze"]);
                        spawnParticles(b.x, b.y, "#00f2ff", 5);
                        if (player.upgrades["Flak Munitions"]) {
                            const r = 130;
                            const flakRank = player.upgrades["Flak Munitions"];
                            blasts.push(new Blast(b.x, b.y, r, b.dmg));
                            enemies.forEach(e2 => { let d = Math.hypot(b.x - e2.x, b.y - e2.y); if (d < r) e2.takeDamage((player.damage * (1 + flakRank * 0.5)) * (1 - d/r)); });
                        }
                        let cr = player.upgrades["Chain Shot"] || 0;
                        if (cr > 0 && b.bounces < cr) {
                            b.visited.push(e);
                            let next = enemies.find(pot => !b.visited.includes(pot) && Math.hypot(b.x - pot.x, b.y - pot.y) < 450);
                            if (next) { b.bounces++; const a = Math.atan2(next.y - b.y, next.x - b.x); b.angle = a; b.vx = Math.cos(a)*18; b.vy = Math.sin(a)*18; }
                            else playerBullets.splice(bi, 1);
                        } else playerBullets.splice(bi, 1);
                    }
                });
                if (b.life <= 0) playerBullets.splice(bi, 1);
            });
            enemyBullets.forEach((b, bi) => {
                b.update();
                if (Math.hypot(b.x - player.x, b.y - player.y) < player.radius + 8) {
                    if (player.shieldReady) { player.shieldReady = false; player.lastShield = Date.now(); }
                    else player.hp -= 15;
                    enemyBullets.splice(bi, 1);
                    if (player.hp <= 0) { gameState = "GAMEOVER"; }
                }
                if (b.life <= 0) enemyBullets.splice(bi, 1);
            });
            enemies.forEach((e, ei) => {
                e.update();
                if (e.hp <= 0) {
                    spawnParticles(e.x, e.y, e.color, 12);
                    if (Math.random() < 0.10) items.push(new Item(e.x, e.y, "repair"));
                    else if (Math.random() < 0.05) items.push(new Item(e.x, e.y, "tech"));
                    enemies.splice(ei, 1);
                }
            });
            if (enemies.length === 0) { if (sector > 0 && sector % 5 === 0) triggerUpgrade(); else { sector++; spawnSector(); } }
        }

        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            starfield.forEach(s => { ctx.fillStyle = "#334"; ctx.fillRect(s.x, s.y, s.size, s.size); });
            thrustParticles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3); });
            ctx.globalAlpha = 1;
            player.draw(); enemies.forEach(e => e.draw());
            playerBullets.forEach(b => b.draw()); enemyBullets.forEach(b => b.draw());
            items.forEach(it => it.draw()); blasts.forEach(bl => bl.draw());
            particles.forEach(p => { ctx.globalAlpha = p.a; ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 2, 2); });
            ctx.globalAlpha = 1;

            ctx.fillStyle = "#fff"; ctx.font = "bold 14px monospace"; ctx.fillText(`SECTOR: ${sector}`, 25, 35);
            ctx.fillStyle = "#1e293b"; ctx.fillRect(25, 45, 160, 10);
            ctx.fillStyle = "#00f2ff"; ctx.fillRect(25, 45, Math.max(0, (player.hp/player.maxHp)*160), 10);

            if (gameState === "PAUSED" || gameState === "UPGRADE" || gameState === "START") {
                ctx.fillStyle = "rgba(0,0,10,0.95)"; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.textAlign = "center";
                if (gameState === "PAUSED") {
                    ctx.fillStyle = "#00f2ff"; ctx.font = "bold 24px sans-serif"; ctx.fillText("PILOT LOG", WIDTH/2, 100);
                    let i = 0; for (let [name, lv] of Object.entries(player.upgrades)) {
                        ctx.fillStyle = "#fff"; ctx.font = "16px monospace"; ctx.fillText(`${name}: Rank ${lv}`, WIDTH/2, 160 + (i * 25)); i++;
                    }
                    ctx.fillStyle = "#ff3366"; ctx.font = "bold 16px sans-serif"; ctx.fillText("PRESS 'R' TO ABORT & RE-DEPLOY", WIDTH/2, HEIGHT - 100);
                    ctx.fillStyle = "#94a3b8"; ctx.fillText("PRESS 'P' TO RESUME", WIDTH/2, HEIGHT - 60);
                } else {
                    ctx.fillStyle = "#00f2ff"; ctx.font = "bold 30px sans-serif";
                    ctx.fillText(gameState === "START" ? "HANGAR LOADOUT" : "TECH UPGRADE", WIDTH/2, 150);
                    selectedUpgrades.forEach((up, i) => {
                        const y = 280 + (i * 90); ctx.fillStyle = "#1e293b"; ctx.fillRect(WIDTH/2 - 220, y - 45, 440, 75);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 20px sans-serif"; ctx.fillText(`[${i+1}] ${up.icon} ${up.name}`, WIDTH/2, y - 10);
                        ctx.font = "15px sans-serif"; ctx.fillStyle = "#94a3b8"; ctx.fillText(up.desc, WIDTH/2, y + 15);
                    });
                }
            }
            if (gameState === "GAMEOVER") {
                ctx.fillStyle = "rgba(20,0,0,0.95)"; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.textAlign = "center"; ctx.fillStyle = "#ff3366"; ctx.font = "bold 36px sans-serif"; ctx.fillText("MISSION FAILED", WIDTH/2, 60);
                ctx.fillStyle = "#00f2ff"; ctx.font = "bold 20px sans-serif"; ctx.fillText("--- FULL MISSION LOG ---", WIDTH/2, 110);
                getRunHistory().slice(0, 10).forEach((s, i) => {
                    ctx.fillStyle = (s.sector === sector - 1 && !scoreSubmitted) ? "#ffff00" : "#fff";
                    ctx.fillText(`${i+1}. ${s.name} | SECTOR: ${s.sector} | ${s.date}`, WIDTH/2, 150 + (i * 22));
                });
                ctx.fillStyle = "#fff"; ctx.font = "bold 18px monospace"; ctx.fillText(`FINAL SCORE: SECTOR ${sector-1}`, WIDTH/2, 450);
                ctx.fillStyle = "#ffaa00"; ctx.fillText(`PRESS 'R' TO RE-DEPLOY`, WIDTH/2, 510);
                if(!scoreSubmitted) { scoreSubmitted = true; setTimeout(() => { let p = prompt("ENTER PILOT CALLSIGN (3 CHARS):", "ACE"); if(p) saveRun(p, sector-1); }, 500); }
            }
            ctx.textAlign = "left";
        }

        window.addEventListener('keydown', e => {
            const k = e.key.toLowerCase(); keys[k] = true;
            if (k === 'p' && (gameState === "PLAYING" || gameState === "PAUSED")) gameState = (gameState === "PAUSED") ? "PLAYING" : "PAUSED";
            if (gameState === "PAUSED" && k === 'r') resetGame();
            if (gameState === "UPGRADE" || gameState === "START") {
                if (k === '1') applyUpgrade(selectedUpgrades[0]); if (k === '2') applyUpgrade(selectedUpgrades[1]); if (k === '3') applyUpgrade(selectedUpgrades[2]);
            }
            if (gameState === "GAMEOVER" && k === 'r') resetGame();
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function init() {
            for(let i=0; i<100; i++) starfield.push({x: Math.random()*WIDTH, y: Math.random()*HEIGHT, size: Math.random()*2, speed: 0.5+Math.random()*2});
            triggerUpgrade(); requestAnimationFrame(loop);
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        let player = new Player();
        init();
    </script>
</body>
</html>
